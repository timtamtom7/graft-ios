name: Graft
options:
  bundleIdPrefix: com.graft
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Graft:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.app
        INFOPLIST_KEY_CFBundleDisplayName: Graft
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSUserActivityTypes: ""
        INFOPLIST_KEY_CFBundleDisplayName: Graft
        CODE_SIGN_ENTITLEMENTS: Graft/Graft.entitlements
    dependencies:
      - package: SQLite
      - target: GraftWidgetExtension

  GraftWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: GraftWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.app.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Graft Widget
        INFOPLIST_KEY_NSExtension: ""
        CODE_SIGN_ENTITLEMENTS: GraftWidget/GraftWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  GraftMac:
    type: application
    platform: macOS
    sources:
      - path: GraftMac/Sources
      - path: GraftMac/Resources
    settings:
      base:
        INFOPLIST_FILE: GraftMac/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.app.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - package: SQLite
    entitlements:
      path: GraftMac/Resources/GraftMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
