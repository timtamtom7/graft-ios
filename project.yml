name: Graft
options:
  bundleIdPrefix: com.graft
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  Graft:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
      - path: Graft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.app
        INFOPLIST_KEY_CFBundleDisplayName: Graft
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSUserActivityTypes: ""
        INFOPLIST_KEY_CFBundleDisplayName: Graft
        CODE_SIGN_ENTITLEMENTS: Graft/Graft.entitlements
    dependencies:
      - package: SQLite
      - target: GraftWidgetExtension

  GraftWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: GraftWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.app.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Graft Widget
        INFOPLIST_KEY_NSExtension: ""
        CODE_SIGN_ENTITLEMENTS: GraftWidget/GraftWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  GraftMac:
    type: application
    platform: macOS
    sources:
      - path: GraftMac/Sources
      - path: Sources/Models
      - path: Sources/Services
        excludes:
          - "ExportService.swift"
      # Sources/Views intentionally excluded (UIKit/iOS-specific)
      # SubscriptionTier stub lives in GraftMac/Sources/SubscriptionTier.swift
      - path: Sources/Theme
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graft.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_FILE: GraftMac/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
